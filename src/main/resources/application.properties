server.port=8080
server.error.include-stacktrace=never
server.error.include-message=never
server.error.whitelabel.enabled=false

# Thymeleaf
spring.thymeleaf.cache=true

# Forward headers for Nginx reverse proxy
server.forward-headers-strategy=native

# Session Cookie Security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=15m

# Database (use environment variables in production)
spring.datasource.url=jdbc:postgresql://localhost:5432/attendance
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:AttendanceDB#2026}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Auth (override with environment variables in production)
app.auth.username=${APP_AUTH_USERNAME:admin}
app.auth.password=${APP_AUTH_PASSWORD:AttendanceAdmin#2026}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.attendance.audit=INFO
logging.file.name=logs/attendance.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
